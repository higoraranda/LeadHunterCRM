<!doctype html>
<html lang="pt-br" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LeadHunter — CRM de prospecção: gerencie leads, funil de vendas e interações." />
    <meta name="theme-color" content="#0b0d17" />
    <title>LeadHunter · CRM de Prospecção</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Evita "flash" de tema errado: aplica o tema salvo antes do React montar -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = t ? t === 'dark' : true; // padrão: escuro
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
